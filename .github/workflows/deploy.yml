name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 毎日 JST 01:00 = UTC 16:00 にビルド再実行（GitHub データを最新化）
    - cron: '0 16 * * *'
  workflow_dispatch:

# 同時実行を 1 本に絞る（古い方は cancel）
concurrency:
  group: pages
  cancel-in-progress: true

# 最小権限の原則
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Build
        run: npm run build
        working-directory: ./front
        env:
          # 認証ありで GitHub API を叩く（rate limit 60 → 5000 req/hr）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./front/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
